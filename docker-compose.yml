services:
  influxdb:
    image: influxdb:1.8
    container_name: influxdb
    restart: unless-stopped
    environment:
      INFLUXDB_DB: prometheus
      INFLUXDB_HTTP_FLUX_ENABLED: "true"
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    restart: unless-stopped
    depends_on:
      - influxdb
      - node-exporter
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-19090}:9090"

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"

  daily-exporter:
    build:
      context: ./daily-exporter
    container_name: daily-exporter
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      TZ: UTC
      PROMETHEUS_URL: http://prometheus:9090
      PROM_QUERY: '{job="node-exporter"}'
      EXPORT_STEP: 5m
      EXPORT_CRON: "0 0 * * *"
      RUN_ON_STARTUP: "true"
      WORK_DIR: /data/repo
      OUTPUT_DIR: exports
      EXPORT_BRANCH: main
      GIT_AUTHOR_NAME: prometheus-bot
      GIT_AUTHOR_EMAIL: prometheus-bot@example.com
      GITHUB_REPO: ${GITHUB_REPO}
      GITHUB_USERNAME: ${GITHUB_USERNAME}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    volumes:
      - daily-exporter-data:/data

  backend:
    build:
      context: ./backend
    container_name: metrics-backend
    restart: unless-stopped
    depends_on:
      - influxdb
    environment:
      PORT: 13001
      INFLUX_URL: http://influxdb:8086
      INFLUX_DB: prometheus
      DEFAULT_METRIC_PREFIX: node_
      DEFAULT_METRIC_LIMIT: 1000
      QUERY_CONCURRENCY: 8
      ALLOWED_ORIGINS: https://deployment-data-api.reefz.cc,http://localhost:13002
      ALLOWED_ORIGIN_SUFFIXES: .github.io
    ports:
      - "13001:13001"

  frontend:
    build:
      context: ./frontend
    container_name: metrics-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      FRONTEND_API_BASE_URL: ${FRONTEND_API_BASE_URL:-https://deployment-data-api.reefz.cc}
      FRONTEND_GITHUB_RAW_BASE_URL: ${FRONTEND_GITHUB_RAW_BASE_URL}
      FRONTEND_DEFAULT_PREFIX: node_
    ports:
      - "13002:80"

volumes:
  influxdb-data:
  prometheus-data:
  daily-exporter-data:
